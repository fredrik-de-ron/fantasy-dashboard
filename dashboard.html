<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fantasy Allsvenskan Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0f1117; color: #e0e0e0; font-size: 14px; }

  header { background: #1a1d27; border-bottom: 1px solid #2a2d3a; padding: 16px 24px; display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 20px; font-weight: 600; color: #fff; }
  header span { font-size: 13px; color: #666; }

  .nav { background: #1a1d27; border-bottom: 1px solid #2a2d3a; padding: 0 24px; display: flex; gap: 4px; }
  .nav-btn { padding: 12px 18px; font-size: 13px; color: #888; cursor: pointer; border-bottom: 2px solid transparent; background: none; border-top: none; border-left: none; border-right: none; }
  .nav-btn:hover { color: #fff; }
  .nav-btn.aktiv { color: #4a90d9; border-bottom-color: #4a90d9; }

  .vy { display: none; }
  .vy.aktiv { display: block; }

  .toolbar { background: #1a1d27; padding: 12px 24px; display: flex; gap: 10px; flex-wrap: wrap; border-bottom: 1px solid #2a2d3a; }
  input[type=text] { background: #0f1117; border: 1px solid #2a2d3a; color: #e0e0e0; padding: 7px 12px; border-radius: 6px; font-size: 13px; width: 200px; }
  input[type=text]:focus { outline: none; border-color: #4a90d9; }
  select { background: #0f1117; border: 1px solid #2a2d3a; color: #e0e0e0; padding: 7px 12px; border-radius: 6px; font-size: 13px; cursor: pointer; }
  select:focus { outline: none; border-color: #4a90d9; }
  .count { margin-left: auto; font-size: 13px; color: #666; align-self: center; }

  .table-wrap { overflow-x: auto; padding: 0 24px 24px; }
  table { width: 100%; border-collapse: collapse; margin-top: 16px; }
  th { background: #1a1d27; color: #888; font-size: 12px; font-weight: 500; padding: 10px 12px; text-align: left; position: sticky; top: 0; cursor: pointer; user-select: none; white-space: nowrap; border-bottom: 1px solid #2a2d3a; }
  th:hover { color: #fff; }
  th.asc::after  { content: " ↑"; color: #4a90d9; }
  th.desc::after { content: " ↓"; color: #4a90d9; }
  td { padding: 9px 12px; border-bottom: 1px solid #1e2130; white-space: nowrap; cursor: pointer; }
  tr:hover td { background: #1e2130; }
  tr.ej-tillganglig td { opacity: 0.5; }

  .pos { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .pos-MV  { background: #1a3a5c; color: #6ab0f5; }
  .pos-DEF { background: #1a3d2a; color: #5dba7a; }
  .pos-MID { background: #3d3516; color: #f0c040; }
  .pos-ANF { background: #3d1a1a; color: #f07070; }

  .pris-up   { color: #5dba7a; }
  .pris-down { color: #f07070; }
  .pris-neu  { color: #888; }

  .sparkline { display: inline-flex; align-items: flex-end; gap: 2px; height: 24px; vertical-align: middle; }
  .sparkline span { width: 5px; border-radius: 2px 2px 0 0; }
  .ingen { color: #444; font-size: 12px; }

  .fdr-pill { display: inline-block; width: 32px; height: 22px; border-radius: 4px; font-size: 11px; font-weight: 700; text-align: center; line-height: 22px; }
  .fdr-pill-dgw { display: inline-block; padding: 0 6px; height: 22px; border-radius: 4px; font-size: 10px; font-weight: 700; text-align: center; line-height: 22px; background: #2a1a4a; color: #c07dda; border: 1.5px solid #9060d0; }

  .status-ikon { font-size: 13px; margin-right: 3px; }
  .nyheter-box { border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px; }
  .nyheter-box.skadad   { background: #2a1a1a; border: 1px solid #3d1a1a; color: #da7d7d; }
  .nyheter-box.avstangd { background: #2a2410; border: 1px solid #4a4010; color: #d4c44a; }
  .nyheter-box.osaker   { background: #2a1e10; border: 1px solid #4a3210; color: #d4944a; }
  .nyheter-box.ej-tillg { background: #1a1a1a; border: 1px solid #2a2d3a; color: #888; }

  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
  .modal-bg.open { display: flex; }
  .modal { background: #1a1d27; border: 1px solid #2a2d3a; border-radius: 16px; width: 100%; max-width: 780px; max-height: 90vh; overflow-y: auto; padding: 28px; position: relative; }
  .modal-close { position: absolute; top: 16px; right: 20px; background: none; border: none; color: #666; font-size: 22px; cursor: pointer; }
  .modal-close:hover { color: #fff; }
  .modal-header { display: flex; align-items: flex-start; gap: 20px; margin-bottom: 16px; }
  .modal-avatar { width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; flex-shrink: 0; }
  .modal-namn { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 4px; }
  .modal-sub { font-size: 14px; color: #888; }
  .stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 24px; }
  .stat-box { background: #0f1117; border-radius: 10px; padding: 14px; text-align: center; }
  .stat-box .val { font-size: 22px; font-weight: 700; color: #fff; }
  .stat-box .lbl { font-size: 11px; color: #666; margin-top: 4px; }
  .section-title { font-size: 13px; font-weight: 600; color: #888; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 12px; }
  .formgraf { display: flex; align-items: flex-end; gap: 6px; height: 80px; margin-bottom: 24px; }
  .formgraf-col { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
  .formgraf-bar { width: 100%; border-radius: 4px 4px 0 0; min-height: 4px; }
  .formgraf-lbl { font-size: 10px; color: #555; }
  .formgraf-p { font-size: 11px; color: #888; }
  .adv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  .adv-section h4 { font-size: 12px; color: #666; font-weight: 500; margin-bottom: 10px; border-bottom: 1px solid #2a2d3a; padding-bottom: 6px; }
  .adv-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid #12141c; }
  .adv-row:last-child { border-bottom: none; }
  .adv-lbl { font-size: 13px; color: #888; }
  .adv-val { font-size: 13px; font-weight: 600; color: #e0e0e0; }
  .transfer-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #1e2130; }
  .transfer-row:last-child { border-bottom: none; }
  .priskurva-wrap { margin-bottom: 24px; }
  .priskurva-svg { width: 100%; height: 120px; overflow: visible; }

  .fdr-fixtures-wrap { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .fdr-fixture-box { border-radius: 8px; padding: 10px 14px; text-align: center; min-width: 70px; }
  .fdr-fixture-box.dgw { background: #2a1a4a; border: 2px solid #9060d0; }
  .fdr-fixture-mot { font-size: 11px; font-weight: 600; }
  .fdr-fixture-num { font-size: 20px; font-weight: 700; margin: 2px 0; }
  .fdr-fixture-sub { font-size: 10px; opacity: 0.8; }
  .fdr-expand-btn { background: none; border: 1px solid #2a2d3a; color: #666; padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; margin-top: 4px; margin-bottom: 24px; display: block; }
  .fdr-expand-btn:hover { color: #fff; border-color: #4a90d9; }

  .fdr-matrix { padding: 24px; overflow-x: auto; }
  .fdr-matrix table { border-collapse: collapse; }
  .fdr-matrix th { background: #1a1d27; color: #888; font-size: 12px; padding: 10px 8px; text-align: center; border-bottom: 1px solid #2a2d3a; white-space: nowrap; }
  .fdr-matrix th.lag-col { text-align: left; padding-left: 16px; min-width: 160px; }
  .fdr-matrix th.dgw-col { color: #c07dda; }
  .fdr-matrix td { padding: 4px 6px; border-bottom: 1px solid #1e2130; text-align: center; }
  .fdr-matrix td.lag-namn { text-align: left; padding-left: 16px; font-weight: 500; color: #e0e0e0; white-space: nowrap; }
  .fdr-cell { display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 6px 4px; border-radius: 6px; min-width: 48px; }
  .fdr-cell .fdr-mot { font-size: 10px; font-weight: 600; }
  .fdr-cell .fdr-num { font-size: 12px; font-weight: 700; }
  .fdr-cell .fdr-hb  { font-size: 9px; opacity: 0.7; }
  .fdr-dgw-cell { display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 6px 4px; border-radius: 6px; min-width: 48px; background: #2a1a4a; border: 1.5px solid #9060d0; }
  .fdr-dgw-cell .fdr-mot { font-size: 10px; font-weight: 600; color: #c07dda; }
  .fdr-dgw-cell .fdr-num { font-size: 12px; font-weight: 700; color: #c07dda; }
  .fdr-dgw-cell .fdr-hb  { font-size: 9px; color: #c07dda; opacity: 0.8; }
  .fdr-empty { color: #2a2d3a; }

  .ai-wrap { padding: 24px; max-width: 800px; }
  .ai-omgang { font-size: 13px; color: #666; margin-bottom: 20px; }
  .ai-sektion { background: #1a1d27; border: 1px solid #2a2d3a; border-radius: 12px; padding: 20px 24px; margin-bottom: 16px; }
  .ai-sektion h2 { font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 16px; }
  .ai-text { font-size: 14px; color: #c0c0c0; line-height: 1.8; }
  .ai-text p { margin-bottom: 10px; }
  .ai-text hr { border: none; border-top: 1px solid #2a2d3a; margin: 12px 0; }
</style>
</head>
<body>

<header>
  <h1>Fantasy Allsvenskan 2026</h1>
  <span id="uppdaterad">Laddar...</span>
</header>

<div class="nav">
  <button class="nav-btn aktiv" onclick="byttVy('spelare', this)">Spelare</button>
  <button class="nav-btn" onclick="byttVy('fdr', this)">Fixture Difficulty</button>
  <button class="nav-btn" onclick="byttVy('ai', this)">🤖 AI-tips</button>
</div>

<div id="vy-spelare" class="vy aktiv">
  <div class="toolbar">
    <input type="text" id="sok" placeholder="Sök spelare...">
    <select id="filter-pos">
      <option value="">Alla positioner</option>
      <option value="Målvakt">Målvakt</option>
      <option value="Försvarare">Försvarare</option>
      <option value="Mittfältare">Mittfältare</option>
      <option value="Anfallare">Anfallare</option>
    </select>
    <select id="filter-lag"><option value="">Alla lag</option></select>
    <select id="filter-pris-max">
      <option value="">Max pris</option>
      <option value="6">Max 6.0</option>
      <option value="7">Max 7.0</option>
      <option value="8">Max 8.0</option>
      <option value="9">Max 9.0</option>
      <option value="10">Max 10.0</option>
    </select>
    <select id="filter-status">
      <option value="">Alla spelare</option>
      <option value="a">Endast tillgängliga</option>
      <option value="d">Inkl. osäkra</option>
    </select>
    <span class="count" id="antal"></span>
  </div>
  <div class="table-wrap">
    <table id="tabell">
      <thead>
        <tr>
          <th data-kol="namn">Spelare</th>
          <th data-kol="lag">Lag</th>
          <th data-kol="position">Pos</th>
          <th data-kol="pris">Pris</th>
          <th data-kol="prisand">±</th>
          <th data-kol="agarskap">Äg%</th>
          <th data-kol="poang">Poäng</th>
          <th data-kol="ppg">P/M</th>
          <th data-kol="form3">Form 3</th>
          <th data-kol="minuter">Min</th>
          <th data-kol="mal">Mål</th>
          <th data-kol="assist">Ast</th>
          <th data-kol="xg">xG</th>
          <th data-kol="xg_p90">xG/90</th>
          <th data-kol="xa">xA</th>
          <th data-kol="xa_p90">xA/90</th>
          <th data-kol="betyg">Betyg</th>
          <th>Form</th>
          <th>FDR nästa</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<div id="vy-fdr" class="vy">
  <div class="fdr-matrix">
    <div style="margin-bottom:16px;">
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <span style="font-size:13px;color:#888;">Svårighetsgrad:</span>
        <span style="background:#0d3320;color:#2ecc71;padding:3px 10px;border-radius:4px;font-size:12px;font-weight:600;">1 Lättast</span>
        <span style="background:#3a4a10;color:#b8d432;padding:3px 10px;border-radius:4px;font-size:12px;font-weight:600;">3 Medel</span>
        <span style="background:#4a1a1a;color:#e05050;padding:3px 10px;border-radius:4px;font-size:12px;font-weight:600;">5 Svår</span>
        <span style="background:#2d0808;color:#ff1010;padding:3px 10px;border-radius:4px;font-size:12px;font-weight:600;">7 Tuffast</span>
        <span style="background:#2a1a4a;border:1.5px solid #9060d0;color:#c07dda;padding:3px 10px;border-radius:4px;font-size:12px;font-weight:600;">★ Double GW</span>
      </div>
    </div>
    <table id="fdr-tabell"></table>
  </div>
</div>

<div id="vy-ai" class="vy">
  <div class="ai-wrap">
    <div id="ai-innehall">
      <p style="color:#666;font-size:14px;">Laddar AI-analys...</p>
    </div>
    <div class="ai-sektion" style="margin-top:16px;">
      <h2>🎴 Chipstrategi för säsongen</h2>
      <div id="chip-innehall">
        <p style="color:#666;font-size:14px;">Laddar chipanalys...</p>
      </div>
    </div>
  </div>
</div>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <button class="modal-close" id="modal-close">✕</button>
    <div id="modal-innehall"></div>
  </div>
</div>

<script>
let DATA = [];
let sortKol = "poang";
let sortDir = -1;

const POS_KOD  = { "Målvakt":"MV","Försvarare":"DEF","Mittfältare":"MID","Anfallare":"ANF" };
const POS_FARG = { "MV":"#1a3a5c","DEF":"#1a3d2a","MID":"#3d3516","ANF":"#3d1a1a" };
const POS_TEXT = { "MV":"#6ab0f5","DEF":"#5dba7a","MID":"#f0c040","ANF":"#f07070" };

const STATUS_IKON = {
  "a": "", "i": "🤕 ", "s": "🟨 ", "d": "⚠️ ", "u": "❌ ", "n": "⛔ ",
};
const STATUS_KLASS = {
  "i": "skadad", "s": "avstangd", "d": "osaker", "u": "ej-tillg", "n": "ej-tillg",
};

function statusIkon(status) { return STATUS_IKON[status] || ""; }

function nyhetBox(s) {
  if (s.status === "a") return "";
  const klass = STATUS_KLASS[s.status] || "ej-tillg";
  const chans = s.chans < 100 ? `<br><span style="font-size:12px;opacity:0.8;">Chans att spela: ${s.chans}%</span>` : "";
  return `<div class="nyheter-box ${klass}">
    ${statusIkon(s.status)}<strong>${s.status_text || s.status}</strong>${s.nyheter ? " — " + s.nyheter : ""}${chans}
  </div>`;
}

function fdrFarg(fdr) {
  const r = Math.round(fdr * 2) / 2;
  if (r <= 1)   return { bg: "#0d3320", text: "#2ecc71" };
  if (r <= 1.5) return { bg: "#1a4a1a", text: "#4dd674" };
  if (r <= 2)   return { bg: "#1a4a1a", text: "#5dba7a" };
  if (r <= 2.5) return { bg: "#2a4a10", text: "#8ecf3a" };
  if (r <= 3)   return { bg: "#3a4a10", text: "#b8d432" };
  if (r <= 3.5) return { bg: "#4a4010", text: "#d4c44a" };
  if (r <= 4)   return { bg: "#4a3210", text: "#d4944a" };
  if (r <= 4.5) return { bg: "#4a2210", text: "#d4774a" };
  if (r <= 5)   return { bg: "#4a1a1a", text: "#e05050" };
  if (r <= 5.5) return { bg: "#4a1010", text: "#e03030" };
  if (r <= 6)   return { bg: "#3d1010", text: "#cc2020" };
  return             { bg: "#2d0808", text: "#ff1010" };
}

function byttVy(vy, knapp) {
  document.querySelectorAll(".vy").forEach(v => v.classList.remove("aktiv"));
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("aktiv"));
  document.getElementById("vy-" + vy).classList.add("aktiv");
  knapp.classList.add("aktiv");
  if (vy === "fdr") byggFdrMatris();
  if (vy === "ai") { laddaAiInsikter(); laddaChipInsikter(); }
}

fetch("dashboard_data.json")
  .then(r => r.json())
  .then(data => {
    DATA = data;
    document.getElementById("uppdaterad").textContent = `${data.length} spelare laddade`;
    const lag = [...new Set(data.map(s => s.lag))].sort();
    const sel = document.getElementById("filter-lag");
    lag.forEach(l => {
      const o = document.createElement("option");
      o.value = l; o.textContent = l;
      sel.appendChild(o);
    });
    rita();
  });

function filtrera() {
  const sok      = document.getElementById("sok").value.toLowerCase();
  const pos      = document.getElementById("filter-pos").value;
  const lag      = document.getElementById("filter-lag").value;
  const prisMax  = parseFloat(document.getElementById("filter-pris-max").value) || 99;
  const statusF  = document.getElementById("filter-status").value;
  return DATA.filter(s => {
    if (sok && !s.namn.toLowerCase().includes(sok) && !s.lag.toLowerCase().includes(sok)) return false;
    if (pos && s.position !== pos) return false;
    if (lag && s.lag !== lag) return false;
    if (s.pris > prisMax) return false;
    if (statusF === "a" && s.status !== "a") return false;
    if (statusF === "d" && s.status !== "a" && s.status !== "d") return false;
    return true;
  });
}

function sortera(lista) {
  return [...lista].sort((a, b) => {
    const av = a[sortKol] ?? -999;
    const bv = b[sortKol] ?? -999;
    if (typeof av === "string") return sortDir * av.localeCompare(bv, "sv");
    return sortDir * (bv - av);
  });
}

function sparkline(historik) {
  if (!historik || historik.length === 0) return '<span class="ingen">—</span>';
  const max = Math.max(...historik.map(h => h.p), 1);
  return '<span class="sparkline">' +
    historik.map(h => {
      const hojd = Math.max(2, Math.round((h.p / max) * 24));
      const farg = h.p >= 8 ? "#5dba7a" : h.p >= 4 ? "#4a90d9" : "#555";
      return `<span style="height:${hojd}px;background:${farg}" title="GW${h.gw}: ${h.p}p"></span>`;
    }).join("") + '</span>';
}

function fdrNastaPill(fdr_lista) {
  if (!fdr_lista || fdr_lista.length === 0) return '<span class="ingen">—</span>';
  const nasta = fdr_lista[0];
  if (nasta.dgw) {
    return `<span class="fdr-pill-dgw" title="${nasta.mot} (${nasta.hemma ? 'H' : 'B'})">★ DGW</span>`;
  }
  const { bg, text } = fdrFarg(nasta.fdr);
  const hb = nasta.hemma ? "H" : "B";
  return `<span class="fdr-pill" style="background:${bg};color:${text}" title="${nasta.mot} (${hb})">${nasta.fdr}</span>`;
}

function fmt(v, dec=1) {
  return v != null ? Number(v).toFixed(dec) : '<span class="ingen">—</span>';
}

function rita() {
  const lista = sortera(filtrera());
  const tbody = document.getElementById("tbody");
  document.getElementById("antal").textContent = `${lista.length} spelare`;
  tbody.innerHTML = lista.map(s => {
    const pos     = POS_KOD[s.position] || s.position;
    const prisKls = s.prisand > 0 ? "pris-up" : s.prisand < 0 ? "pris-down" : "pris-neu";
    const prisSign= s.prisand > 0 ? "+" : "";
    const ejTillg = s.status !== "a" && s.status !== "d" ? "ej-tillganglig" : "";
    return `<tr data-id="${s.id}" class="${ejTillg}">
      <td>${statusIkon(s.status)}<strong>${s.namn}</strong></td>
      <td>${s.lag}</td>
      <td><span class="pos pos-${pos}">${pos}</span></td>
      <td>${fmt(s.pris)}</td>
      <td class="${prisKls}">${prisSign}${fmt(s.prisand,1)}</td>
      <td>${fmt(s.agarskap)}%</td>
      <td><strong>${s.poang}</strong></td>
      <td>${fmt(s.ppg)}</td>
      <td>${fmt(s.form3)}</td>
      <td>${s.minuter}</td>
      <td>${s.mal}</td>
      <td>${s.assist}</td>
      <td>${fmt(s.xg,2)}</td>
      <td>${fmt(s.xg_p90,2)}</td>
      <td>${fmt(s.xa,2)}</td>
      <td>${fmt(s.xa_p90,2)}</td>
      <td>${fmt(s.betyg,2)}</td>
      <td>${sparkline(s.historik)}</td>
      <td>${fdrNastaPill(s.fdr)}</td>
    </tr>`;
  }).join("");
  document.querySelectorAll("th").forEach(th => {
    th.classList.remove("asc","desc");
    if (th.dataset.kol === sortKol) th.classList.add(sortDir === -1 ? "desc" : "asc");
  });
}

document.querySelectorAll("th[data-kol]").forEach(th => {
  th.addEventListener("click", () => {

function byggFdrMatris() {
  if (!DATA.length) return;
  const lagFdr = {};
  DATA.forEach(s => {
    if (s.fdr && s.fdr.length > 0 && !lagFdr[s.lag]) lagFdr[s.lag] = s.fdr;
  });
  const lagNamn = Object.keys(lagFdr).sort();
  const gwSlots = {};
  lagNamn.forEach(lag => {
    const gwCount = {};
    lagFdr[lag].forEach(m => { gwCount[m.gw] = (gwCount[m.gw] || 0) + 1; });
    Object.entries(gwCount).forEach(([gw, count]) => {
      gwSlots[Number(gw)] = Math.max(gwSlots[Number(gw)] || 1, count);
    });
  });
  const gwLista = Object.keys(gwSlots).map(Number).sort((a, b) => a - b);
  let html = "<thead><tr><th class='lag-col'>Lag</th>";
  gwLista.forEach(gw => {
    const slots = gwSlots[gw];
    html += slots > 1
      ? `<th colspan="${slots}" class="dgw-col">★ Omg. ${gw}</th>`
      : `<th>Omg. ${gw}</th>`;
  });
  html += "</tr></thead><tbody>";
  lagNamn.forEach(lag => {
    const gwMap = {};
    lagFdr[lag].forEach(m => {
      const gw = Number(m.gw);
      if (!gwMap[gw]) gwMap[gw] = [];
      gwMap[gw].push(m);
    });
    html += `<tr><td class="lag-namn">${lag}</td>`;
    gwLista.forEach(gw => {
      const slots   = gwSlots[gw];
      const matcher = gwMap[gw] || [];
      for (let i = 0; i < slots; i++) {
        const m = matcher[i];
        if (!m) {
          html += `<td><span class="fdr-empty">·</span></td>`;
        } else if (m.dgw) {
          html += `<td><div class="fdr-dgw-cell">
            <span class="fdr-mot">★ ${m.mot}</span>
            <span class="fdr-num">${m.fdr}</span>
            <span class="fdr-hb">${m.hemma ? "H" : "B"}</span>
          </div></td>`;
        } else {
          const { bg, text } = fdrFarg(m.fdr);
          html += `<td><div class="fdr-cell" style="background:${bg}">
            <span class="fdr-mot" style="color:${text}">${m.mot}</span>
            <span class="fdr-num" style="color:${text}">${m.fdr}</span>
            <span class="fdr-hb" style="color:${text}">${m.hemma ? "H" : "B"}</span>
          </div></td>`;
        }
      }
    });
    html += "</tr>";
  });
  html += "</tbody>";
  document.getElementById("fdr-tabell").innerHTML = html;
}

function laddaAiInsikter() {
  fetch("ai_insikter.json")
    .then(r => r.json())
    .then(data => {
      function formatera(text) {
        return text
          .split('\n')
          .map(rad => {
            if (rad.startsWith('# ') || rad.startsWith('## ') || rad.startsWith('### ')) {
              const ren = rad.replace(/^#{1,3} /, '');
              return `<p style="font-size:15px;font-weight:600;color:#4a90d9;margin-bottom:8px;">${ren}</p>`;
            }
            if (rad.startsWith('---')) return '<hr style="border:none;border-top:1px solid #2a2d3a;margin:12px 0;">';
            if (rad.trim() === '') return '';
            const ren = rad.replace(/\*\*(.*?)\*\*/g, '<strong style="color:#fff;">$1</strong>');
            return `<p style="margin-bottom:8px;">${ren}</p>`;
          })
          .join('');
      }
      document.getElementById("ai-innehall").innerHTML = `
        <p class="ai-omgang">Analys för omgång ${data.omgang} — genererad av Claude AI</p>
        <div class="ai-sektion">
          <h2>🎯 Kaptenstips omgång ${data.omgang}</h2>
          <div class="ai-text">${formatera(data.kaptenstips)}</div>
        </div>
        <div class="ai-sektion">
          <h2>💎 Differentials</h2>
          <div class="ai-text">${formatera(data.differentials)}</div>
        </div>
        <div class="ai-sektion">
          <h2>📈 Prisrörelser — köp och sälj INNAN marknaden</h2>
          <div class="ai-text">${formatera(data.prisrorelser)}</div>
        </div>
        ${data.transferanalys ? `
        <div class="ai-sektion">
          <h2>🔄 Transferanalys — 5-omgångsperspektiv</h2>
          <div class="ai-text">${formatera(data.transferanalys)}</div>
        </div>` : ''}
        ${data.lardomar ? `
        <div class="ai-sektion">
          <h2>📚 Lärdomar från föregående omgång</h2>
          <div class="ai-text">${formatera(data.lardomar)}</div>
        </div>` : ''}
      `;
    })
    .catch(() => {
      document.getElementById("ai-innehall").innerHTML =
        '<p style="color:#666;font-size:14px;">Ingen AI-analys tillgänglig. Kör scripts/ai_analys.py för att generera.</p>';
    });
}

function prisKurvaHtml(historik) {
  if (!historik || historik.length < 2) return "";
  const W = 700, H = 90, padX = 10, padY = 20;
  const priser = historik.map(h => h.pris);
  const minP   = Math.min(...priser) - 0.3;
  const maxP   = Math.max(...priser) + 0.3;
  const n      = historik.length;
  const xPos = i => padX + (i / (n - 1)) * (W - padX * 2);
  const yPos = v  => padY + (1 - (v - minP) / (maxP - minP)) * (H - padY * 1.5);
  const punkter = historik.map((h, i) => `${xPos(i).toFixed(1)},${yPos(h.pris).toFixed(1)}`);
  const linjeD  = "M" + punkter.join("L");
  const areaD   = linjeD + `L${xPos(n-1).toFixed(1)},${H}L${xPos(0).toFixed(1)},${H}Z`;
  const etiketter = historik.map((h, i) => {
    const erMin = h.pris === Math.min(...priser);
    const erMax = h.pris === Math.max(...priser);
    if (!erMin && !erMax && i !== 0 && i !== n - 1) return "";
    const farg = erMax ? "#5dba7a" : erMin ? "#f07070" : "#aaa";
    return `<text x="${xPos(i).toFixed(1)}" y="${(yPos(h.pris) - 6).toFixed(1)}" text-anchor="middle" style="fill:${farg};font-size:11px;font-weight:600">${h.pris.toFixed(1)}</text>`;
  }).join("");
  const gwLabels = historik.map((h, i) => {
    if (i % 2 !== 0 && i !== n - 1) return "";
    return `<text x="${xPos(i).toFixed(1)}" y="${H + 4}" text-anchor="middle" style="fill:#555;font-size:10px">${h.gw}</text>`;
  }).join("");
  return `
    <div class="section-title" style="margin-top:24px;">Prisutveckling</div>
    <div class="priskurva-wrap">
      <svg class="priskurva-svg" viewBox="0 0 ${W} ${H + 14}" preserveAspectRatio="none">
        <defs>
          <linearGradient id="prisgrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#4a90d9" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="#4a90d9" stop-opacity="0.02"/>
          </linearGradient>
        </defs>
        <path d="${areaD}" fill="url(#prisgrad)"/>
        <path d="${linjeD}" fill="none" stroke="#4a90d9" stroke-width="2"/>
        ${etiketter}
        ${gwLabels}
      </svg>
    </div>`;
}

function fdrKortHtml(fdr_lista, visaAlla) {
  if (!fdr_lista || fdr_lista.length === 0) return "";
  const visa    = visaAlla ? fdr_lista : fdr_lista.slice(0, 5);
  const harFler = fdr_lista.length > 5;
  const matcher_html = visa.map(m => {
    if (m.dgw) {
      return `<div class="fdr-fixture-box dgw">
        <div class="fdr-fixture-mot" style="color:#c07dda;">★ ${m.mot}</div>
        <div class="fdr-fixture-num" style="color:#c07dda;">${m.fdr}</div>
        <div class="fdr-fixture-sub" style="color:#c07dda;">GW${m.gw} ${m.hemma ? "H" : "B"} · DGW</div>
      </div>`;
    }
    const { bg, text } = fdrFarg(m.fdr);
    return `<div class="fdr-fixture-box" style="background:${bg}">
      <div class="fdr-fixture-mot" style="color:${text}">${m.mot}</div>
      <div class="fdr-fixture-num" style="color:${text}">${m.fdr}</div>
      <div class="fdr-fixture-sub" style="color:${text}">GW${m.gw} ${m.hemma ? "H" : "B"}</div>
    </div>`;
  }).join("");
  const knapp_html = harFler
    ? visaAlla
      ? `<button class="fdr-expand-btn" onclick="toggleFdrKort(this)">↑ Visa färre</button>`
      : `<button class="fdr-expand-btn" onclick="toggleFdrKort(this)">↓ Visa alla ${fdr_lista.length} matcher</button>`
    : "";
  return `
    <div class="section-title" style="margin-top:24px;">Kommande matcher (FDR)</div>
    <div class="fdr-fixtures-wrap" data-fdr='${JSON.stringify(fdr_lista).replace(/'/g, "&#39;")}' data-visa-alla="${visaAlla ? '1' : '0'}">
      ${matcher_html}
    </div>
    ${knapp_html}`;
}

function toggleFdrKort(knapp) {
  const sektion   = document.getElementById("fdr-kort-sektion");
  const wrap      = sektion.querySelector(".fdr-fixtures-wrap");
  if (!wrap) return;
  const fdr_lista = JSON.parse(wrap.dataset.fdr);
  const visaAlla  = wrap.dataset.visaAlla === "1";
  sektion.innerHTML = fdrKortHtml(fdr_lista, !visaAlla);
}

function oppnaKort(s) {
  const pos      = POS_KOD[s.position] || "?";
  const bg       = POS_FARG[pos] || "#222";
  const fg       = POS_TEXT[pos] || "#fff";
  const prisSign = s.prisand > 0 ? "+" : "";
  const prisKls  = s.prisand > 0 ? "#5dba7a" : s.prisand < 0 ? "#f07070" : "#888";
  const hist  = s.historik || [];
  const maxP  = Math.max(...hist.map(h => h.p), 1);
  const grafHtml = hist.length ? `
    <div class="section-title">Poäng per omgång</div>
    <div class="formgraf">
      ${hist.map(h => {
        const hojd = Math.max(4, Math.round((h.p / maxP) * 70));
        const farg = h.p >= 8 ? "#5dba7a" : h.p >= 4 ? "#4a90d9" : "#3a3d4a";
        return `<div class="formgraf-col">
          <div class="formgraf-p">${h.p}</div>
          <div class="formgraf-bar" style="height:${hojd}px;background:${farg}"></div>
          <div class="formgraf-lbl">${h.gw}</div>
        </div>`;
      }).join("")}
    </div>` : "";
  const harFotmob = s.xg != null;
  const advHtml = harFotmob ? `
    <div class="section-title" style="margin-top:24px;">Avancerad statistik (FotMob)</div>
    <div class="adv-grid">
      <div class="adv-section">
        <h4>Skott</h4>
        <div class="adv-row"><span class="adv-lbl">xG</span><span class="adv-val">${fmt(s.xg,2)}</span></div>
        <div class="adv-row"><span class="adv-lbl">xG per 90</span><span class="adv-val">${fmt(s.xg_p90,2)}</span></div>
        <div class="adv-row"><span class="adv-lbl">Skott</span><span class="adv-val">${s.skott ?? "—"}</span></div>
        <div class="adv-row"><span class="adv-lbl">FotMob-betyg</span><span class="adv-val">${fmt(s.betyg,2)}</span></div>
      </div>
      <div class="adv-section">
        <h4>Passningar</h4>
        <div class="adv-row"><span class="adv-lbl">xA</span><span class="adv-val">${fmt(s.xa,2)}</span></div>
        <div class="adv-row"><span class="adv-lbl">xA per 90</span><span class="adv-val">${fmt(s.xa_p90,2)}</span></div>
        <div class="adv-row"><span class="adv-lbl">Chanser skapade</span><span class="adv-val">${s.chanser ?? "—"}</span></div>
      </div>
    </div>` : `<p style="color:#555;font-size:13px;margin-top:16px;">Ingen FotMob-data tillgänglig.</p>`;
  const transHtml = `
    <div class="section-title" style="margin-top:24px;">Marknadsinfo</div>
    <div class="transfer-row"><span style="color:#888;">Transfers in</span><span style="color:#5dba7a;font-weight:600;">+${s.trans_in.toLocaleString("sv")}</span></div>
    <div class="transfer-row"><span style="color:#888;">Transfers ut</span><span style="color:#f07070;font-weight:600;">-${s.trans_ut.toLocaleString("sv")}</span></div>
    <div class="transfer-row"><span style="color:#888;">Ägarskap</span><span style="font-weight:600;">${s.agarskap}%</span></div>
    <div class="transfer-row"><span style="color:#888;">Chans att spela</span><span style="font-weight:600;">${s.chans}%</span></div>`;
  document.getElementById("modal-innehall").innerHTML = `
    <div class="modal-header">
      <div class="modal-avatar" style="background:${bg};color:${fg}">${pos}</div>
      <div>
        <div class="modal-namn">${s.namn}</div>
        <div class="modal-sub">${s.lag} · ${s.position}</div>
      </div>
      <div style="margin-left:auto;text-align:right;">
        <div style="font-size:26px;font-weight:700;color:#fff;">${fmt(s.pris)}</div>
        <div style="font-size:13px;color:${prisKls};">${prisSign}${fmt(s.prisand,1)} denna omgång</div>
      </div>
    </div>
    ${nyhetBox(s)}
    <div class="stats-grid">
      <div class="stat-box"><div class="val">${s.poang}</div><div class="lbl">Totalpoäng</div></div>
      <div class="stat-box"><div class="val">${fmt(s.ppg)}</div><div class="lbl">Poäng/match</div></div>
      <div class="stat-box"><div class="val">${fmt(s.form3)}</div><div class="lbl">Form (snitt 3)</div></div>
      <div class="stat-box"><div class="val">${s.mal}</div><div class="lbl">Mål</div></div>
      <div class="stat-box"><div class="val">${s.assist}</div><div class="lbl">Assist</div></div>
      <div class="stat-box"><div class="val">${s.nollor}</div><div class="lbl">Nollor</div></div>
      <div class="stat-box"><div class="val">${s.minuter}</div><div class="lbl">Minuter</div></div>
    </div>
    ${grafHtml}
    ${prisKurvaHtml(s.prishistorik)}
    <div id="fdr-kort-sektion">
      ${fdrKortHtml(s.fdr, false)}
    </div>
    ${advHtml}
    ${transHtml}
  `;
  document.getElementById("modal-bg").classList.add("open");
}
