name: Uppdatera Fantasy Dashboard

on:
  schedule:
    - cron: '0 6 * * *'  # Varje dag kl 06:00 UTC
  workflow_dispatch:       # Tillåter manuell körning

jobs:
  kolla_matchdag:
    runs-on: ubuntu-latest
    outputs:
      spelades_matcher: ${{ steps.kolla.outputs.spelades_matcher }}
    steps:
      - name: Hämta koden
        uses: actions/checkout@v4

      - name: Sätt upp Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installera httpx
        run: pip install httpx

      - name: Kolla om det spelades matcher igår
        id: kolla
        run: |
          if python scripts/kolla_matchdag.py; then
            echo "spelades_matcher=ja" >> $GITHUB_OUTPUT
          else
            echo "spelades_matcher=nej" >> $GITHUB_OUTPUT
          fi

  uppdatera:
    runs-on: ubuntu-latest
    needs: kolla_matchdag
    if: needs.kolla_matchdag.outputs.spelades_matcher == 'ja' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Hämta koden
        uses: actions/checkout@v4

      - name: Sätt upp Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installera paket
        run: |
          pip install httpx rapidfuzz openpyxl python-dotenv

      - name: Hämta Fantasy-data
        run: python scripts/hamta_data.py

      - name: Hämta FotMob-data
        run: python scripts/hamta_fotmob.py

      - name: Slå ihop data
        run: python scripts/sla_ihop.py

      - name: Beräkna FDR
        run: python scripts/berakna_fdr.py

      - name: Bygg dashboard-data
        run: python scripts/bygg_dashboard_data.py

      - name: Kör AI-analys
        run: python scripts/ai_analys.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Bygg offline-dashboard
        run: python scripts/bygg_offline.py

      - name: Spara uppdaterad data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard_data.json kombinerad.json spelare_komplett.json fotmob_stats.json fdr_data.json ai_insikter.json index.html
          git diff --staged --quiet || git commit -m "Uppdaterad data $(date '+%Y-%m-%d')"
          git push