name: Daglig pris- och statusuppdatering

on:
  schedule:
    - cron: '0 8,14,20 * * *'
  workflow_dispatch:

jobs:
  uppdatera_priser:
    runs-on: ubuntu-latest

    steps:
      - name: Hämta koden
        uses: actions/checkout@v4

      - name: Sätt upp Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installera paket
        run: pip install httpx python-dotenv

      - name: Uppdatera priser och status
        run: python scripts/uppdatera_priser_status.py

      - name: Bygg offline-dashboard
        run: python scripts/bygg_offline.py

      - name: Spara uppdaterad data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard_data.json index.html
          git diff --staged --quiet || git commit -m "Priser och status $(date '+%Y-%m-%d %H:%M')"
          git push